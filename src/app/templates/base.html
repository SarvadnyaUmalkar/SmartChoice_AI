<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartChoice AI{% endblock %}</title>
  <meta name="description" content="AI-powered multi-domain Decision Intelligence Platform" />

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ─── Navigation ──────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg sc-navbar fixed-top" id="mainNav">
  <div class="container-fluid px-4">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="brand-icon">
        <i class="bi bi-cpu-fill"></i>
      </div>
      <div>
        <span class="brand-name">SmartChoice</span>
        <span class="brand-ai"> AI</span>
        <div class="brand-tagline">Decision Intelligence</div>
      </div>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <i class="bi bi-list fs-4"></i>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item">
          <a class="nav-link nav-pill {% if request.endpoint == 'main.index' %}active{% endif %}" href="/">
            <i class="bi bi-chat-dots-fill me-1"></i> AI Advisor
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-pill {% if request.endpoint == 'main.dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-pill {% if request.endpoint == 'main.history_page' %}active{% endif %}" href="/history">
            <i class="bi bi-clock-history me-1"></i> History
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <!-- AI Status Indicator -->
        <div class="ai-status-badge" id="aiStatusBadge">
          <span class="status-dot"></span>
          <span class="status-text">AI Ready</span>
        </div>

        <!-- Theme Toggle -->
        <button class="btn btn-sm btn-theme-toggle" id="themeToggleBtn" title="Toggle theme">
          <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- ─── Main Content ─────────────────────────────────────────────────────── -->
<main class="sc-main" id="mainContent">
  {% block content %}{% endblock %}
</main>

<!-- ─── Toast Notifications ─────────────────────────────────────────────── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:11000" id="toastContainer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- Main JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
